<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;600;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0a0a0a;color:#f0f0f0;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px);pointer-events:none;z-index:0;opacity:.35;}
  .lock{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:24px;padding:20px;width:100%;max-width:380px;}
  .logo{display:flex;align-items:center;gap:13px;}
  .logo-icon{width:48px;height:48px;background:#c8ff00;border-radius:12px;display:grid;place-items:center;flex-shrink:0;overflow:hidden;}
  .logo-icon img{width:48px;height:48px;object-fit:cover;border-radius:12px;display:block;}
  .logo-text h1{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:#c8ff00;letter-spacing:1px;}
  .logo-text p{font-size:12px;color:#555;margin-top:2px;}
  .card{width:100%;background:#111;border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:28px 24px;}
  .title{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:18px;text-align:center;}
  .inp-wrap{position:relative;margin-bottom:14px;}
  .inp-wrap input{width:100%;background:#161616;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:14px 46px 14px 16px;font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:#c8ff00;letter-spacing:3px;outline:none;transition:border-color .2s;}
  .inp-wrap input:focus{border-color:#c8ff00;}
  .inp-wrap input::placeholder{color:#333;letter-spacing:0;font-weight:400;font-size:14px;}
  .toggle{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#555;font-size:16px;line-height:1;transition:color .15s;}
  .toggle:hover{color:#c8ff00;}
  .err{text-align:center;font-size:13px;color:#ff4444;min-height:18px;margin-bottom:10px;}
  .btn{width:100%;background:#c8ff00;color:#000;border:none;border-radius:10px;padding:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;}
  .btn:hover{background:#d8ff20;transform:translateY(-1px);}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
  .hint{font-size:10px;color:#2a2a2a;text-align:center;font-family:'Space Mono',monospace;}
  .dots{display:inline-flex;gap:4px;align-items:center;}
  .dots span{width:6px;height:6px;border-radius:50%;background:#000;animation:d .8s infinite;}
  .dots span:nth-child(2){animation-delay:.15s;}
  .dots span:nth-child(3){animation-delay:.3s;}
  @keyframes d{0%,80%,100%{opacity:.2}40%{opacity:1}}

  @media(max-width:480px){
    body{padding-bottom:68px;align-items:flex-start;padding-top:40px;}
    .mobile-nav{position:fixed;bottom:0;left:0;right:0;background:#0d0d0d;border-top:1px solid rgba(255,255,255,0.07);display:flex;z-index:200;padding:8px 0 calc(8px + env(safe-area-inset-bottom,0px));}
    .mnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:default;color:#404040;padding:4px 0;}
    .mnav-item.active{color:#c8ff00;}
    .mnav-item span{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;}
    .mnav-item svg{width:22px;height:22px;}
  }
  @media(min-width:481px){.mobile-nav{display:none !important;}}
  @media(max-width:400px){
    .lock{padding:16px;gap:18px;}
    .card{padding:22px 18px;}
    .inp-wrap input{font-size:14px;padding:12px 42px 12px 14px;}
    .btn{font-size:14px;padding:13px;}
  }
</style>
</head>
<body>
<div class="lock">

function togglePw(){const i=document.getElementById('pw');i.type=i.type==='password'?'text':'password';}
async function unlock(){
  const pw=document.getElementById('pw').value;
  const btn=document.getElementById('btn');
  const err=document.getElementById('err');
  if(!pw){err.textContent='Digite a senha.';return;}
  btn.disabled=true;
  btn.innerHTML='<span class="dots"><span></span><span></span><span></span></span>';
  err.textContent='';
  try{
    const raw=Uint8Array.from(atob(ENC),c=>c.charCodeAt(0));
    const salt=raw.slice(0,16),iv=raw.slice(16,28),cipher=raw.slice(28);
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,cipher);
    const html=new TextDecoder().decode(plain);
    document.open();document.write(html);document.close();
  }catch(e){
    err.textContent='Senha incorreta.';
    btn.disabled=false;btn.textContent='Entrar';
    document.getElementById('pw').value='';
    document.getElementById('pw').focus();
  }
}
window.addEventListener('load',()=>document.getElementById('pw').focus());
